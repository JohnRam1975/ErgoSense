name: ErgoSense CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: "22"
  DATABASE_URL: postgresql://ergosense:ergosense@localhost:5432/ergosense_test
  PGHOST: localhost
  PGPORT: 5432
  PGDATABASE: ergosense_test
  PGUSER: ergosense
  PGPASSWORD: ergosense

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ergosense-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ergosense-app/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  unit-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ergosense-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            ergosense-app/package-lock.json
            ergosense-app/server/package-lock.json
      - run: npm ci
      - run: npm ci --prefix server
      - run: npm test
      - run: npm --prefix server test
      - run: npm run coverage:fe
      - run: npm --prefix server run coverage
      - run: npm run coverage:baseline

  api-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ergosense
          POSTGRES_PASSWORD: ergosense
          POSTGRES_DB: ergosense_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ergosense -d ergosense_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: ergosense-app/server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ergosense-app/server/package-lock.json
      - run: npm ci
      - run: npm run migrate:all
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
      - name: Supertest integration (Postgres service)
        run: npm run test:integration
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGDATABASE: ergosense_test
          PGUSER: ergosense
          PGPASSWORD: ergosense
      - name: Upload integration logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-logs
          path: |
            ergosense-app/server/integration-test.log
            ergosense-app/server/coverage-run.log
          if-no-files-found: ignore
      - run: npm run test:migrations:ci
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          AUDIT_EMAIL: auditor@ergosense.test
          AUDIT_PASS: AuditTest!2026
      - run: npm run seed:audit
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          AUDIT_EMAIL: auditor@ergosense.test
          AUDIT_PASS: AuditTest!2026
          AUDIT_TENANT: acme
      - run: npm run test:db
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
      - run: npm start &
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          PORT: 3001
          PURGE_DEMO_TENANTS: "false"
      - run: npx wait-on http://localhost:3001/api/health -t 60000
      - run: npm run test:security:smoke
        env:
          API_URL: http://localhost:3001
          AUDIT_EMAIL: auditor@ergosense.test
          AUDIT_PASS: AuditTest!2026
          AUDIT_TENANT: acme
      - run: npm run test:operational
        env:
          AUDIT_API_URL: http://localhost:3001
          AUDIT_EMAIL: auditor@ergosense.test
          AUDIT_PASS: AuditTest!2026
          AUDIT_TENANT: acme
      - run: npm run test:onboarding
        env:
          API_URL: http://localhost:3001
      - run: npm run test:endpoints
        env:
          API_URL: http://localhost:3001
          AUDIT_EMAIL: auditor@ergosense.test
          AUDIT_PASS: AuditTest!2026
          AUDIT_TENANT: acme
      - run: npm run test:matrix
        env:
          API_URL: http://localhost:3001
          AUDIT_EMAIL: auditor@ergosense.test
          AUDIT_PASS: AuditTest!2026
          AUDIT_TENANT: acme
      - run: npm run test:openapi
      - run: npm run test:security:advanced
        env:
          API_URL: http://localhost:3001
          AUDIT_EMAIL: auditor@ergosense.test
          AUDIT_PASS: AuditTest!2026
          AUDIT_TENANT: acme
      - run: npm run test:load
        env:
          AUDIT_API_URL: http://localhost:3001
          AUDIT_EMAIL: auditor@ergosense.test
          AUDIT_PASS: AuditTest!2026
          AUDIT_TENANT: acme
      - run: npm run test:resilience
        env:
          AUDIT_API_URL: http://localhost:3001
          AUDIT_EMAIL: auditor@ergosense.test
          AUDIT_PASS: AuditTest!2026
          AUDIT_TENANT: acme

  e2e:
    runs-on: ubuntu-latest
    needs: [lint-typecheck]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ergosense
          POSTGRES_PASSWORD: ergosense
          POSTGRES_DB: ergosense_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ergosense -d ergosense_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: ergosense-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            ergosense-app/package-lock.json
            ergosense-app/server/package-lock.json
      - run: npm ci
      - run: npm ci --prefix server
      - run: npx playwright install chromium --with-deps
      - run: npm --prefix server run migrate:all
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
      - name: Seed admin global + auditor QA
        run: |
          node server/scripts/seed-global-admin.js
          node server/scripts/seed-audit-user.js
        working-directory: ergosense-app
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          SEED_GLOBAL_ADMIN_EMAIL: ergosense@dejohn.com.br
          SEED_GLOBAL_ADMIN_PASSWORD: "@Ergo!2026/Adm"
          AUDIT_EMAIL: auditor@ergosense.test
          AUDIT_PASS: AuditTest!2026
          AUDIT_TENANT: acme
      - run: npm --prefix server start &
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          PORT: 3001
          PURGE_DEMO_TENANTS: "false"
      - run: npm run dev &
      - run: npx wait-on http://localhost:3001/api/health http://localhost:5173 -t 120000
      - run: npm run test:e2e
        env:
          CI: true
          E2E_BASE_URL: http://localhost:5173
          E2E_API_URL: http://localhost:3001
          AUDIT_EMAIL: auditor@ergosense.test
          AUDIT_PASS: AuditTest!2026
          E2E_EMAIL: auditor@ergosense.test
          E2E_PASSWORD: AuditTest!2026
          E2E_GLOBAL_EMAIL: ergosense@dejohn.com.br
          E2E_GLOBAL_PASSWORD: "@Ergo!2026/Adm"

  docker-build:
    runs-on: ubuntu-latest
    needs: [lint-typecheck, unit-tests]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Build Postgres image
        run: docker build -f infra/Dockerfile.postgres -t ergosense/postgres:ci .
      - name: Build API image
        run: docker build -f infra/Dockerfile.api -t ergosense/api:ci .
      - name: Build Web image
        run: docker build -f infra/Dockerfile.web -t ergosense/web:ci .
