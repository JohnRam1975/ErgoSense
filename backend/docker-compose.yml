services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ergosense
      POSTGRES_USER: ergosense
      POSTGRES_PASSWORD: ergosense
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../docs/database/postgresql-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ergosense
      MINIO_ROOT_PASSWORD: ergosense123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  miniodata:
