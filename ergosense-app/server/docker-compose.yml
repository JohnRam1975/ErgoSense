# PostgreSQL local ErgoSense — porta 5433 (mesma convenção do pgAdmin/warehouse)
# Uso: docker compose up -d
services:
  postgres:
    image: postgres:17-alpine
    container_name: ergosense-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${PGUSER:-postgres}
      POSTGRES_PASSWORD: ${PGPASSWORD}
      POSTGRES_DB: ${PGDATABASE:-ergosense}
    volumes:
      - ergosense_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER:-postgres} -d ${PGDATABASE:-ergosense}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  ergosense_pgdata:
