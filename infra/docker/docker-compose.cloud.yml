# ErgoSense — stack cloud-native (Compose hoje, Kubernetes amanhã)
# Uso (a partir da raiz do repo):
#   docker compose --env-file infra/docker/.env -f infra/docker/docker-compose.cloud.yml up -d
# Ou:
#   cd infra/docker && copy .env.example .env && docker compose -f docker-compose.cloud.yml up -d --build
# Escalar API: docker compose -f infra/docker/docker-compose.cloud.yml up -d --scale api=3

name: ergosense-cloud

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ergosense}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?defina POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PUBLISH_PORT:-5434}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../../docs/database/postgresql-schema-full.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ergosense}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [ergosense]

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [ergosense]

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-ergosense}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?defina RABBITMQ_PASSWORD}
    ports:
      - "${RABBITMQ_PUBLISH_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks: [ergosense]

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-ergosense}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?defina MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks: [ergosense]

  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    environment:
      NODE_ENV: production
      PORT: 3001
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: ${POSTGRES_DB:-ergosense}
      PGUSER: ${POSTGRES_USER:-postgres}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      REDIS_ENABLED: "true"
      REDIS_URL: redis://redis:6379
      CACHE_ENABLED: "true"
      SESSION_REDIS_ENABLED: "true"
      RABBITMQ_ENABLED: "true"
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-ergosense}:${RABBITMQ_PASSWORD}@rabbitmq:5672
      TRACING_ENABLED: "true"
      MFA_ENABLED: "true"
      STORAGE_DRIVER: minio
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_BUCKET: ergosense-media
      STORAGE_ACCESS_KEY: ${MINIO_ROOT_USER:-ergosense}
      STORAGE_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      METRICS_ENABLED: "true"
      TRUST_PROXY: "true"
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/health/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 25s
    networks: [ergosense]
    deploy:
      replicas: 1

  web:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.web
      args:
        VITE_API_URL: /api
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks: [ergosense]

  gateway:
    image: nginx:1.27-alpine
    ports:
      - "${GATEWAY_PORT:-8080}:80"
    volumes:
      - ./nginx/proxy.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api: { condition: service_healthy }
      web: { condition: service_started }
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 15s
      timeout: 3s
      retries: 3
    networks: [ergosense]

  prometheus:
    image: prom/prometheus:v2.55.1
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    ports:
      - "9090:9090"
    networks: [ergosense]

  grafana:
    image: grafana/grafana:11.4.0
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafanadata:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3002}:3000"
    depends_on:
      - prometheus
    networks: [ergosense]

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.16.0
    environment:
      DATA_SOURCE_NAME: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ergosense}?sslmode=disable
    depends_on:
      postgres: { condition: service_healthy }
    networks: [ergosense]

  redis-exporter:
    image: oliver006/redis_exporter:v1.66.0
    environment:
      REDIS_ADDR: redis:6379
    depends_on:
      - redis
    networks: [ergosense]

volumes:
  pgdata:
  redisdata:
  miniodata:
  promdata:
  grafanadata:

networks:
  ergosense:
    driver: bridge
