# Nginx — SPA + proxy /api
upstream ergosense_api {
    least_conn;
    server backend:3001 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 25m;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml application/manifest+json;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # API + health (mesmo domínio → PWA / cookies CSRF ok)
    location /api/ {
        proxy_pass http://ergosense_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 15s;
        proxy_read_timeout 300s;
        proxy_next_upstream error timeout http_502 http_503 http_504;
    }

    location = /health {
        proxy_pass http://ergosense_api/health;
        access_log off;
    }

    location = /health/live {
        proxy_pass http://ergosense_api/health/live;
        access_log off;
    }

    location = /health/ready {
        proxy_pass http://ergosense_api/health/ready;
        access_log off;
    }

    # PWA / assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|webp|webmanifest)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
