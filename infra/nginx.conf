# Nginx — SPA + proxy /api (capacidade para bursts ~500 VUs)
worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout  65;
    client_max_body_size 25m;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml application/manifest+json;

    upstream ergosense_api {
        least_conn;
        server backend:3001 max_fails=3 fail_timeout=10s;
        keepalive 128;
        keepalive_requests 1000;
        keepalive_timeout 60s;
    }

    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;

        # API + health (mesmo domínio → PWA / cookies CSRF ok)
        location /api/ {
            proxy_pass http://ergosense_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_connect_timeout 10s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 2;
        }

        location = /health {
            proxy_pass http://ergosense_api/health;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            access_log off;
        }

        location = /health/live {
            proxy_pass http://ergosense_api/health/live;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            access_log off;
        }

        location = /health/ready {
            proxy_pass http://ergosense_api/health/ready;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            access_log off;
        }

        # Alias sob /api (mesmo domínio do SPA) — evita 401 do authenticate genérico
        location = /api/health/live {
            proxy_pass http://ergosense_api/health/live;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            access_log off;
        }
        location = /api/health/ready {
            proxy_pass http://ergosense_api/health/ready;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            access_log off;
        }

        # SW / entrypoints — nunca immutable (senão deploy fica com JS velho)
        location = /sw.js {
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Service-Worker-Allowed "/" always;
            try_files $uri =404;
        }

        location ~* ^/workbox-.*\.js$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            try_files $uri =404;
        }

        location = /manifest.webmanifest {
            add_header Cache-Control "no-cache" always;
            try_files $uri =404;
        }

        location = /index.html {
            add_header Cache-Control "no-cache" always;
        }

        # Só assets com hash no nome podem ser immutable
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable" always;
            try_files $uri =404;
        }

        location ~* \.(png|jpg|jpeg|gif|ico|svg|woff2|webp)$ {
            expires 7d;
            add_header Cache-Control "public" always;
            try_files $uri =404;
        }

        location / {
            add_header Cache-Control "no-cache" always;
            try_files $uri $uri/ /index.html;
        }
    }
}
