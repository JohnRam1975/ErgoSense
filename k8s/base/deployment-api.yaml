apiVersion: apps/v1
kind: Deployment
metadata:
  name: ergosense-api
  namespace: ergosense
  labels:
    app: ergosense-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ergosense-api
  template:
    metadata:
      labels:
        app: ergosense-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3001"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: api
          image: ergosense/api:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
              name: http
          envFrom:
            - configMapRef:
                name: ergosense-api-config
            - secretRef:
                name: ergosense-api-secret
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
      terminationGracePeriodSeconds: 30
