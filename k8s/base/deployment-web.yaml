apiVersion: apps/v1
kind: Deployment
metadata:
  name: ergosense-web
  namespace: ergosense
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ergosense-web
  template:
    metadata:
      labels:
        app: ergosense-web
    spec:
      containers:
        - name: web
          image: ergosense/web:1.0.0
          ports:
            - containerPort: 80
              name: http
          livenessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
