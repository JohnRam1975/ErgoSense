apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ergosense-ingress
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "20m"
spec:
  ingressClassName: nginx
  rules:
    - host: ergosense.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: ergosense-api
                port:
                  number: 3001
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ergosense-web
                port:
                  number: 80
---
# Acesso direto sem Ingress (LoadBalancer no Docker Desktop)
apiVersion: v1
kind: Service
metadata:
  name: ergosense-web-lb
  labels:
    app: ergosense-web
spec:
  type: LoadBalancer
  selector:
    app: ergosense-web
  ports:
    - port: 8080
      targetPort: 80
      name: http
