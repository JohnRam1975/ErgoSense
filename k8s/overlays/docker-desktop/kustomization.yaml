# Overlay para Kubernetes do Docker Desktop (aparece na aba Kubernetes)
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ergosense

resources:
  - ../../base/namespace.yaml
  - ../../base/configmap-api.yaml
  - ../../base/deployment-api.yaml
  - ../../base/service-api.yaml
  - ../../base/deployment-web.yaml
  - ../../base/service-web.yaml
  - postgres.yaml
  - redis.yaml
  - ingress.yaml

patches:
  - path: patch-api.yaml
  - path: patch-web.yaml

images:
  - name: ergosense/api
    newName: ergosense/api
    newTag: local
  - name: ergosense/web
    newName: ergosense/web
    newTag: local

secretGenerator:
  - name: ergosense-api-secret
    envs:
      - secrets.env
    options:
      disableNameSuffixHash: true

configMapGenerator:
  - name: ergosense-db-init
    files:
      - 01-schema.sql=../../../docs/database/postgresql-schema-full.sql
      - 02-seed.sql=../../../docs/database/postgresql-seed.sql
    options:
      disableNameSuffixHash: true

commonLabels:
  app.kubernetes.io/part-of: ergosense
  app.kubernetes.io/instance: docker-desktop
