apiVersion: v1
kind: Service
metadata:
  name: ergosense-postgres
  labels:
    app: ergosense-postgres
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
  selector:
    app: ergosense-postgres
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ergosense-postgres
  labels:
    app: ergosense-postgres
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ergosense-postgres
  template:
    metadata:
      labels:
        app: ergosense-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: ergosense
            - name: POSTGRES_USER
              value: ergosense
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ergosense-api-secret
                  key: PGPASSWORD
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "ergosense", "-d", "ergosense"]
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "ergosense", "-d", "ergosense"]
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: ergosense-postgres-pvc
        - name: init
          configMap:
            name: ergosense-db-init
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ergosense-postgres-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
