apiVersion: v1
kind: Service
metadata:
  name: ergosense-redis
  labels:
    app: ergosense-redis
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: 6379
      name: redis
  selector:
    app: ergosense-redis
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ergosense-redis
  labels:
    app: ergosense-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ergosense-redis
  template:
    metadata:
      labels:
        app: ergosense-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args: ["redis-server", "--appendonly", "yes"]
          ports:
            - containerPort: 6379
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            periodSeconds: 5
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 128Mi
              cpu: 200m
