name: ergosense_mobile
description: ErgoSense AI — Análise Ergonômica Industrial com IA (Offline-First)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State
  flutter_riverpod: ^2.5.1

  # Database
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0

  # Network
  dio: ^5.4.3
  connectivity_plus: ^6.0.3

  # Auth & Security
  flutter_secure_storage: ^9.2.2
  jwt_decoder: ^2.0.1

  # Camera & AI
  camera: ^0.11.0
  tflite_flutter: ^0.10.4
  image: ^4.2.0

  # Sync
  workmanager: ^0.5.2

  # Utils
  uuid: ^4.4.0
  intl: ^0.19.0
  equatable: ^2.0.5
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.18.0
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  assets:
    - assets/models/
    - assets/images/

  fonts:
    - family: BarlowCondensed
      fonts:
        - asset: assets/fonts/BarlowCondensed-Bold.ttf
          weight: 700
    - family: DMSans
      fonts:
        - asset: assets/fonts/DMSans-Regular.ttf
          weight: 400
